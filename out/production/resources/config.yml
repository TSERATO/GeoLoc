#Welcome to the GeoLoc Configuration File
#Current Version: 2.0
#Author: TSERATO
#Discord: @tserato

#Here you can change the prefix of the messages. You are able to use color codes like: &a or &c.
prefix: "&c&lGeoloc&7&l>> &r"


#Toggle on or off, if all players with geoloc.use permission will get the Geolocation of a joining player.
auto-run-on-join: false

use-discord: false
webhook-url: "YOUR_WEBHOOK_URL_HERE"
discord-join-message: "Player {Player} joined us today from {Country}"
discord-join-message-color: "#00FF00"  # Hex color code for GREEN

discord-first-join-message: "The new Player {Player} joined us today from {Country}"
discord-first-join-message-color: "#FFFF00"  # Hex color code for YELLOW